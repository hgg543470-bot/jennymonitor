name: Build APK
on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libffi-dev libssl-dev libltdl-dev zlib1g-dev openjdk-17-jdk unzip zip cmake autoconf libtool pkg-config python3-setuptools
          pip install --upgrade pip buildozer "Cython==0.29.33" setuptools wheel

      # --- ВОТ ЭТОТ БЛОК ТЫ ЗАБЫЛ ---
      - name: Cache Buildozer directories
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-
      # ------------------------------

      - name: Build with Buildozer
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          sed -i 's/^#* *android.accept_sdk_license.*/android.accept_sdk_license = True/' buildozer.spec
          sed -i 's/^#* *android.build_tools_version.*/android.build_tools_version = 34.0.0/' buildozer.spec
          sed -i 's/^#* *android.api.*/android.api = 34/' buildozer.spec
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: JennyMonitor-Package
          path: bin/*.apk
          
